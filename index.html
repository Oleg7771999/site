<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STACHET</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    .logo {
      width: 220px;
      margin-top: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px #00eaff;
    }

    .title {
      font-size: 32px;
      margin-top: 15px;
      color: #7ffcff;
      text-shadow: 0 0 10px #4ff2ff;
      font-weight: bold;
    }

    .block {
      background: #0a0a0a;
      border: 1px solid #00eaff;
      margin: 25px auto;
      padding: 20px;
      width: 85%;
      border-radius: 12px;
      box-shadow: 0 0 15px #00eaff;
    }

    .block-title {
      font-size: 22px;
      margin-bottom: 15px;
      color: #7ffcff;
      text-shadow: 0 0 10px #4ff2ff;
    }

    .btn {
      display: block;
      background: #00eaff;
      color: #000;
      padding: 14px;
      margin: 10px auto;
      width: 80%;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #4ff2ff;
    }

    #redirect-msg {
      display: none;
      margin-top: 20px;
      font-size: 18px;
      color: #7ffcff;
      text-shadow: 0 0 10px #4ff2ff;
    }

    .footer {
      margin-top: 40px;
      color: #7ffcff;
      opacity: 0.7;
      font-size: 18px;
      text-shadow: 0 0 8px #4ff2ff;
    }
  </style>
</head>

<body>

  <img class="logo" src="stachet.jpg">
  <div class="title">STACHET</div>

  <div id="redirect-msg">Переход через 3 секунды...</div>

  <div class="block">
    <div class="block-title">💰 Обменник</div>
    <div class="btn" data-link="exchange">Перейти</div>
  </div>

  <div class="block">
    <div class="block-title">👨‍💻 Оператор</div>
    <div class="btn" data-link="operator">Перейти</div>
  </div>

  <div class="block">
    <div class="block-title">🤖 Боты продаж</div>
    <div class="btn" data-link="bot1">Бот #1</div>
    <div class="btn" data-link="bot2">Бот #2</div>
  </div>

  <div class="block">
    <div class="block-title">💬 Чат</div>
    <div class="btn" data-link="chat">Перейти</div>
  </div>

  <div class="block">
    <div class="block-title">📢 Канал</div>
    <div class="btn" data-link="channel">Перейти</div>
  </div>

  <div class="block">
    <div class="block-title">🔗 Все контакты</div>
    <div class="btn" data-link="contacts">Открыть</div>
  </div>

  <div class="footer">STACHET</div>

  <script>
    async function loadLinks() {
      const msg = document.getElementById('redirect-msg');

      try {
        const res = await fetch('/api/links');
        const data = await res.json();

        document.querySelectorAll('.btn').forEach(btn => {
          const key = btn.dataset.link;

          btn.onclick = () => {
            msg.style.display = 'block';
            msg.textContent = "Переход через 3 секунды...";
            setTimeout(() => window.location.href = data[key], 3000);
          };
        });

      } catch (e) {
        msg.style.display = 'block';
        msg.textContent = "Ошибка загрузки ссылок";
      }
    }

    window.onload = loadLinks;
  </script>

</body>
</html>
