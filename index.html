<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>STACHET</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: #000;
      background: radial-gradient(circle at top, rgba(0, 255, 255, 0.08), transparent 60%),
                  radial-gradient(circle at bottom, rgba(0, 180, 200, 0.06), transparent 70%),
                  #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
    }

    .container {
      width: 90%;
      max-width: 600px;
    }

    .title {
      text-align: center;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 35px;
      color: #7ffcff;
      text-shadow: 0 0 12px #4ff2ff, 0 0 25px #3bd8e0;
    }

    .block {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      backdrop-filter: blur(8px);
    }

    .block-title {
      font-size: 18px;
      margin-bottom: 10px;
      color: #bffcff;
      text-shadow: 0 0 8px #4ff2ff;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      border-radius: 14px;
      text-align: center;
      text-decoration: none;
      font-weight: 600;
      color: #000;
      background: linear-gradient(135deg, #7ffcff, #4ff2ff);
      box-shadow: 0 0 12px rgba(79, 242, 255, 0.4);
      transition: 0.25s;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 18px rgba(79, 242, 255, 0.7);
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      opacity: 0.6;
      font-size: 14px;
    }
  </style>

  <script>
    async function loadLinks() {
      try {
        const res = await fetch('/api/links');
        const data = await res.json();

        document.querySelectorAll('[data-link]').forEach(el => {
          const key = el.getAttribute('data-link');
          if (data[key]) el.href = data[key];
        });
      } catch (e) {
        console.log("Ошибка загрузки ссылок");
      }
    }

    window.onload = loadLinks;
  </script>
</head>

<body>
  <div class="container">

    <div class="title">STACHET</div>

    <div class="block">
      <div class="block-title">💰 Обменник</div>
      <a class="btn" data-link="exchange">Перейти</a>
    </div>

    <div class="block">
      <div class="block-title">👨‍💻 Оператор</div>
      <a class="btn" data-link="operator">Перейти</a>
    </div>

    <div class="block">
      <div class="block-title">🤖 Боты продаж</div>
      <a class="btn" data-link="bot1">Бот #1</a>
      <a class="btn" data-link="bot2">Бот #2</a>
    </div>

    <div class="block">
      <div class="block-title">💬 Чат</div>
      <a class="btn" data-link="chat">Перейти</a>
    </div>

    <div class="block">
      <div class="block-title">✅ Канал</div>
      <a class="btn" data-link="channel">Перейти</a>
    </div>

    <div class="block">
      <div class="block-title">🔗 Все контакты</div>
      <a class="btn" data-link="contacts">Открыть</a>
    </div>

    <div class="footer">STACHET © Все права защищены</div>

  </div>
</body>
</html>
